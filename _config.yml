title: "The Present of Work"
url: "https://presentofwork.org"
baseurl: ""
description: >-
  A publication, podcast, map, and gathering place exploring all forms
  of work — not occupational employment, but the full range of human
  contribution. Produced in the commons.

markdown: kramdown
highlighter: rouge

collections:
  essays:
    output: true
    permalink: /essays/:name/
  episodes:
    output: true
    permalink: /episodes/:name/

defaults:
  - scope:
      path: ""
      type: essays
    values:
      layout: post

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md

plugins:
  - jekyll-seo-tag
