<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◎</text></svg>">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta property="og:type" content="website">
<meta property="og:site_name" content="The Present of Work">
<meta property="og:title" content="{% if page.title %}{{ page.title }} — The Present of Work{% else %}The Present of Work{% endif %}">
<meta property="og:description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta name="twitter:card" content="summary">
<link rel="alternate" type="application/rss+xml" title="The Present of Work — Essays" href="/feed.xml">
<title>{% if page.title %}{{ page.title }} — The Present of Work{% else %}The Present of Work{% endif %}</title>
<meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto+Mono:wght@300;400;500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --white:#FFFFFF;--off:#F6F2EB;--ink:#0D0D0D;
  --ink-mid:#444;--ink-lt:#888;
  --red:#C8341C;--red-dk:#A02912;
  --green:#1C4C24;--green-lt:#2D6E38;
  --mono:'Roboto Mono',monospace;
  --display:'Bebas Neue',sans-serif;
  --body:'Libre Baskerville',Georgia,serif;
  --nav-h:52px;
  --bg:var(--white);--surface:var(--off);
  --text:var(--ink);--text-mid:var(--ink-mid);--text-lt:var(--ink-lt);
  --border:#E0E0E0;
}
[data-theme="dark"]{
  --bg:#0D0D0D;--surface:#171717;--text:#F0EDE8;
  --text-mid:#B0A898;--text-lt:#666;--border:#2A2A2A;
  --off:#171717;--white:#0D0D0D;--ink:#F0EDE8;
  --ink-mid:#B0A898;--ink-lt:#666;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--body);background:var(--bg);color:var(--text);overflow-x:hidden;line-height:1.7;transition:background .25s,color .25s}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}

nav{position:fixed;top:0;width:100%;height:var(--nav-h);background:var(--ink);z-index:1000;display:flex;align-items:stretch}
[data-theme="dark"] nav{background:#0a0a0a;border-bottom:1px solid rgba(255,255,255,.08)}
.nav-logo{font-family:var(--display);font-size:1.15rem;letter-spacing:.1em;color:#fff;padding:0 1.5rem;display:flex;align-items:center;border-right:1px solid rgba(255,255,255,.12);white-space:nowrap;flex-shrink:0}
.nav-links{display:flex;align-items:stretch;list-style:none;flex:1}
.nav-links li{display:flex;align-items:stretch}
.nav-links a{font-family:var(--mono);font-size:.58rem;font-weight:400;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.5);padding:0 1rem;display:flex;align-items:center;border-right:1px solid rgba(255,255,255,.08);transition:color .15s,background .15s}
.nav-links a:hover,.nav-links a.active{color:#fff;background:rgba(255,255,255,.06)}
.nav-right{display:flex;align-items:center;margin-left:auto;padding:0 1rem;gap:.75rem;border-left:1px solid rgba(255,255,255,.12)}
.ctoggle{background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.5);padding:.3rem .55rem;cursor:pointer;font-size:.75rem;line-height:1;transition:all .15s;border-radius:2px}
.ctoggle:hover{color:#fff;border-color:#fff}
.hbtn{background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.5);padding:.3rem .6rem;cursor:pointer;font-family:var(--mono);font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;transition:all .15s;display:none}
.hbtn:hover{color:#fff;border-color:#fff}
.mnav{display:none;position:fixed;top:var(--nav-h);left:0;right:0;background:var(--ink);z-index:999;flex-direction:column;border-top:1px solid rgba(255,255,255,.1)}
.mnav.open{display:flex}
.mnav a{font-family:var(--mono);font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.55);padding:.9rem 1.5rem;border-bottom:1px solid rgba(255,255,255,.08);transition:color .15s}
.mnav a:hover{color:#fff}

.btn{font-family:var(--mono);font-size:.6rem;font-weight:500;letter-spacing:.16em;text-transform:uppercase;padding:.75rem 1.75rem;cursor:pointer;display:inline-block;transition:all .15s;text-decoration:none;border:2px solid transparent}
.btn-red{background:var(--red);color:#fff;border-color:var(--red)}
.btn-red:hover{background:var(--red-dk);border-color:var(--red-dk)}
.btn-green{background:var(--green);color:#fff;border-color:var(--green)}
.btn-outline{background:transparent;color:var(--text);border-color:var(--text)}
.btn-outline:hover{background:var(--text);color:var(--bg)}

footer{background:#0D0D0D;border-top:1px solid rgba(255,255,255,.1);padding:1.25rem 3rem 1.25rem 5rem;font-family:var(--mono);font-size:.52rem;font-weight:400;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.3)}
.fi{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem}
footer a{color:rgba(255,255,255,.3);transition:color .15s}
footer a:hover{color:rgba(255,255,255,.8)}
.fl{display:flex;gap:1.5rem;flex-wrap:wrap}

.rv{opacity:0;transform:translateY(18px);transition:opacity .7s cubic-bezier(.22,1,.36,1),transform .7s cubic-bezier(.22,1,.36,1)}
.rv.in{opacity:1;transform:none}
.d1{transition-delay:.1s}.d2{transition-delay:.2s}.d3{transition-delay:.32s}.d4{transition-delay:.45s}

@media(max-width:768px){
  .nav-links{display:none}
  .hbtn{display:block}
  footer{padding:1.25rem 1.5rem}
}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">The Present of Work</a>
  <ul class="nav-links">
    <li><a href="/about.html">About</a></li>
    <li><a href="/publication.html">Publication</a></li>
    <li><a href="/podcast.html">Podcast</a></li>
    <li><a href="/concepts.html">Concepts</a></li>
    <li><a href="/map.html">Map</a></li>
    <li><a href="/ecosystem.html">The Web</a></li>
  </ul>
  <div class="nav-right">
    <button class="ctoggle" id="cToggle" aria-label="Toggle contrast">☀</button>
    <button class="hbtn" id="hBtn">Menu</button>
  </div>
</nav>
<div class="mnav" id="mNav">
  <a href="/about.html">About</a>
  <a href="/publication.html">Publication</a>
  <a href="/podcast.html">Podcast</a>
  <a href="/concepts.html">Concepts</a>
  <a href="/map.html">Map</a>
  <a href="/ecosystem.html">The Web</a>
</div>

{{ content }}

<footer>
  <div class="fi">
    <div class="fl">
      <span>© The Present of Work</span>
      <a href="/about.html">About</a>
      <a href="/publication.html">Publication</a>
      <a href="/essays/">Essays</a>
      <a href="/essays/">Essays</a>
    </div>
    <div>Produced in the commons · <a href="mailto:hello@presentofwork.org">hello@presentofwork.org</a></div>
  </div>
</footer>

<script>
document.getElementById('cToggle').addEventListener('click',function(){
  const d=document.documentElement,dark=d.getAttribute('data-theme')==='dark';
  d.setAttribute('data-theme',dark?'light':'dark');this.textContent=dark?'☀':'☾';
});
document.getElementById('hBtn').addEventListener('click',()=>document.getElementById('mNav').classList.toggle('open'));
const obs=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');obs.unobserve(e.target);}}),{threshold:.07});
document.querySelectorAll('.rv').forEach(el=>obs.observe(el));
</script>
</body>
</html>
